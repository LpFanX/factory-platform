server {
    listen 80;
    listen [::]:80;
    server_name factory.lpfanx.ru;
    location /.well-known/acme-challenge/ { root /var/www/factory; default_type "text/plain"; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name factory.lpfanx.ru;

    ssl_certificate     /etc/letsencrypt/live/factory.lpfanx.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/factory.lpfanx.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8020;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }
}
